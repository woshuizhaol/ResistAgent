project:
  name: ResistAgent
  id: system_bootstrap

outputs:
  root: outputs
  stage_dirs:
    - stage0
    - stage1
    - stage2
    - stage3
    - stage4
    - stage5
    - stage6
    - stage7
    - stage8
    - stage9

resources:
  max_workers: 12
  default_cpu_threads: 4
  max_cpu_threads_per_job: 4
  gpu_slots: 1

stage0:
  data_root: data
  file_manifest: outputs/file_manifest.txt
  data_audit: outputs/data_audit.json
  system_audit: outputs/system_audit.json
  alias_map: outputs/name_alias_map.yaml
  archive_magic_report: outputs/archive_magic_report.tsv
  archive_index: outputs/archive_index.sqlite
  structure_cache_root: outputs/structures/cache
  structure_raw_root: outputs/structures/raw
  project_state_root: outputs/system_bootstrap
  validation_report: outputs/system_bootstrap/stage0/qc/schema_validation.json
  compute_md5: false
  md5_max_bytes: 104857600
  ignore_prefixes:
    - "._"

stage1:
  tables_root: outputs/tables
  mdrdb_main: data/MdrDB/MdrDB_release_v1.0.2022.tsv
  mdrdb_drug_annotation_zip: data/MdrDB/MdrDB_drug_annotation_v1.0.2022.tsv.zip
  mdrdb_protein_annotation_zip: data/MdrDB/MdrDB_protein_annotation_v1.0.2022.tsv.zip
  depmap_mutations_csv: data/DepMap (Cancer Dependency Map)/OmicsSomaticMutations.csv
  depmap_model_csv: data/DepMap (Cancer Dependency Map)/Model.csv
  cosmic_resistance_tar: data/COSMIC/ResistanceMutations/Cosmic_ResistanceMutations_Tsv_v103_GRCh38.tar
  cosmic_cgc_tar: data/COSMIC/CancerGeneCensus/Cosmic_CancerGeneCensus_Tsv_v103_GRCh38.tar
  hiv_rt_raw: data/external/hivdb/raw/RT.txt
  hiv_pr_raw: data/external/hivdb/raw/PR.txt
  hiv_in_raw: data/external/hivdb/raw/IN.txt
  hiv_ref_raw: data/external/hivdb/raw/Ref.txt
  uniprot_gene_cache: data/external/uniprot/raw/uniprot_gene_map.tsv
  hiv_prevalence_cache_tsv: data/external/hiv_prevalence.tsv
  hiv_drug_selected_cache_tsv: data/external/hiv_mutations_by_drug.tsv
  master_table: outputs/tables/master_mutation_table.parquet
  master_schema: outputs/tables/master_mutation_table.schema.json
  mutation_frequency_map: outputs/tables/mutation_frequency_map.parquet
  mutation_combination_map: outputs/tables/mutation_combination_map.parquet
  hiv_prevalence_prior: outputs/tables/hiv_prevalence_prior.parquet
  hiv_drug_selected_prior: outputs/tables/hiv_drug_selected_prior.parquet
  background_prior: outputs/tables/background_prior.parquet
  background_prior_by_tissue: outputs/tables/background_prior_by_tissue.parquet
  drug_selected_prior: outputs/tables/drug_selected_prior.parquet
  observed_combo_prior: outputs/tables/observed_combo_prior.parquet
  global_prior: outputs/tables/global_prior.parquet
  benchmark_prior_blind: outputs/tables/benchmark_prior_blind.parquet
  stage1_build_qc: outputs/tables/stage1_build_tables_qc.json
  hiv_prior_qc: outputs/tables/hiv_prior_qc.json
  mutation_prior_qc: outputs/tables/mutation_prior_qc.json
  mdrdb_chunksize: 20000
  cosmic_chunksize: 20000
  depmap_chunksize: 200000
  tissue_min_denominator: 50
  tissue_aliases:
    Leukemia:
      - Myeloid
      - Lymphoid
  epsilon_background: 1.0e-5

stage1_5:
  projects_root: configs/public_projects
  summary_report: outputs/stage1_5/fetch_summary.json
  rcsb_cache_root: outputs/stage1_5/rcsb_cache
  alphafold_cache_root: outputs/stage1_5/alphafold_cache
  uniprot_cache_root: outputs/stage1_5/uniprot_cache
  pubchem_cache_root: outputs/stage1_5/pubchem_cache
  modeling_request_root: outputs/stage1_5/modeling_requests
  request_timeout_sec: 60
  min_chain_completeness: 0.7
  min_ligand_heavy_atoms: 6

stage2:
  cases_seed_config: configs/cases.seed.yaml
  cases_frozen_config: configs/cases.yaml
  manifests_root: outputs/case_manifests
  rcsb_cache_root: outputs/case_manifests/rcsb_cache
  domain_filter_report: outputs/case_manifests/domain_filter_report.csv
  rt_domain_extraction_report: outputs/case_manifests/RT_domain_extraction_report.csv
  rt_pocket_similarity_report: outputs/case_manifests/rt_pocket_similarity_report.csv
  hiv_nnrti_structure_qc: outputs/case_manifests/hiv_nnrti_structure_qc.csv
  combo_panel: outputs/case_manifests/combo_panel.csv
  site_pool_report: outputs/case_manifests/site_pool.csv
  mutation_pool_report: outputs/case_manifests/mutation_pool.csv
  case_selection_qc: outputs/case_manifests/case_selection_qc.json
  seed_pdb_top_n: 20
  hiv_seed_pdb_top_n: 40
  top_risk_n: 20
  medium_risk_n: 80
  tail_n: 100
  top_combo_n: 20
  combo_min_support: 5
  representative_samples_per_site: 1
  request_timeout_sec: 60
  hiv_pocket_positions:
    - 101
    - 138
    - 181
    - 188
    - 190
    - 227
  hiv_domain_min_identity: 0.7
  hiv_domain_min_query_coverage: 0.5
  hiv_domain_min_effective_score: 0.35
  hiv_rt_keywords:
    - reverse transcriptase
    - p66
    - p51
    - rt
  hiv_exclude_keywords:
    - protease
    - integrase
  hiv_nnrti_aliases:
    - rilpivirine
    - etravirine
    - efavirenz
    - delavirdine
    - nevirapine
    - doravirine
    - dapivirine
    - tmc278
    - tmc125
    - non-nucleoside
    - nnrti

stage3:
  extract_lists_root: outputs/extract_lists
  structures_root: outputs/structures
  sample_cache_root: outputs/structures/cache
  sample_raw_root: outputs/structures/raw
  set_n_external_root: outputs/external_test_set
  set_n_attempt_report: outputs/external_test_set/set_n_attempt_report.csv
  extraction_source_report: outputs/structures/extraction_source_report.csv
  missing_samples_report: outputs/structures/missing_samples.csv
  modeling_queue_report: outputs/structures/modeling_queue.csv
