  extraction_qc: outputs/structures/stage3_extraction_qc.json
  sample_search_roots:
    - data/MdrDB/samples
    - data/MdrDB/extracted_full
  required_roles:
    - WT
    - MT
    - ligand
  optional_roles:
    - WT_complex
    - MT_complex
  archive_extractable_types:
    - Single Substitution
    - Multiple Substitution
    - Multiple Complex
  modeling_queue_types:
    - Deletion
    - Insertion
    - Indel
  extract_list_names:
    egfr_erlotinib: egfr.txt
    abl1_nilotinib: abl1.txt
    hiv_rt_rilpivirine: hiv.txt
  missing_rate_threshold: 0.005

